<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Survivor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #0ff; overflow: hidden; touch-action: none; }
canvas { border: 1px solid #0ff; box-shadow: 0 0 20px #0ff; max-width: 100vw; max-height: 100vh; }
#ui { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); text-align: center; text-shadow: 0 0 8px #0ff; font-size: 0.85rem; white-space: nowrap; }
#overlay { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
#overlay h1 { font-size: 2.5rem; color: #f0f; text-shadow: 0 0 16px #f0f; }
#overlay p { color: #0ff; text-shadow: 0 0 8px #0ff; text-align: center; padding: 0 16px; }
button { background: transparent; border: 2px solid #0ff; color: #0ff; padding: 10px 32px; font-size: 1.1rem; font-family: monospace; cursor: pointer; text-shadow: 0 0 8px #0ff; box-shadow: 0 0 12px #0ff; transition: all 0.2s; }
button:hover { background: #0ff2; box-shadow: 0 0 24px #0ff; }
#joystick-zone { position: absolute; bottom: 0; left: 0; width: 100%; height: 200px; pointer-events: none; }
</style>
</head>
<body>
<div id="ui">
  <span id="score">SCORE: 0</span> &nbsp;&nbsp; <span id="timer">TIME: 0s</span> &nbsp;&nbsp; <span id="wave">WAVE: 1</span>
</div>
<canvas id="c" width="600" height="500"></canvas>
<div id="joystick-zone"></div>
<div id="overlay">
  <h1>NEON SURVIVOR</h1>
  <p>WASD / 방향키 또는 화면 터치로 이동<br>자동 공격</p>
  <button onclick="startGame()">START</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const timerEl = document.getElementById('timer');
const waveEl = document.getElementById('wave');

const W = canvas.width, H = canvas.height;
const keys = {};
const joystick = { active: false, id: null, baseX: 0, baseY: 0, dx: 0, dy: 0 };
let player, bullets, enemies, particles, score, wave, elapsed, spawnTimer, bulletTimer, running;

// Touch joystick
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (!joystick.active) {
      joystick.active = true;
      joystick.id = t.identifier;
      joystick.baseX = t.clientX;
      joystick.baseY = t.clientY;
      joystick.dx = 0;
      joystick.dy = 0;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joystick.id) {
      const dx = t.clientX - joystick.baseX;
      const dy = t.clientY - joystick.baseY;
      const dist = Math.hypot(dx, dy);
      const max = 50;
      if (dist > max) {
        joystick.dx = (dx / dist) * max;
        joystick.dy = (dy / dist) * max;
      } else {
        joystick.dx = dx;
        joystick.dy = dy;
      }
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joystick.id) {
      joystick.active = false;
      joystick.dx = 0;
      joystick.dy = 0;
    }
  }
}, { passive: false });

document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.key] = false; });

function startGame() {
  overlay.style.display = 'none';
  player = { x: W/2, y: H/2, r: 12, hp: 5, speed: 3 };
  bullets = []; enemies = []; particles = [];
  score = 0; wave = 1; elapsed = 0; spawnTimer = 0; bulletTimer = 0;
  running = true;
  requestAnimationFrame(loop);
}

function spawnEnemy() {
  const side = Math.random() * 4 | 0;
  let x, y;
  if (side === 0) { x = Math.random() * W; y = -20; }
  else if (side === 1) { x = W + 20; y = Math.random() * H; }
  else if (side === 2) { x = Math.random() * W; y = H + 20; }
  else { x = -20; y = Math.random() * H; }
  const speed = 0.8 + wave * 0.15 + Math.random() * 0.5;
  enemies.push({ x, y, r: 10, speed, hp: 1 + (wave > 3 ? 1 : 0) });
}

function addParticles(x, y, color) {
  for (let i = 0; i < 6; i++) {
    const angle = Math.random() * Math.PI * 2;
    particles.push({ x, y, vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3, life: 1, color });
  }
}

let lastTime = 0;
function loop(ts) {
  if (!running) return;
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;
  elapsed += dt / 60;

  // Move player
  const spd = player.speed * dt;
  let mx = 0, my = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) mx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) mx += 1;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) my -= 1;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) my += 1;
  if (joystick.active) {
    const jdist = Math.hypot(joystick.dx, joystick.dy);
    if (jdist > 8) { mx = joystick.dx / 50; my = joystick.dy / 50; }
  }
  const mlen = Math.hypot(mx, my);
  if (mlen > 0) {
    player.x = Math.max(player.r, Math.min(W - player.r, player.x + (mx / mlen) * spd));
    player.y = Math.max(player.r, Math.min(H - player.r, player.y + (my / mlen) * spd));
  }

  // Spawn enemies
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    const count = Math.min(1 + Math.floor(wave / 2), 4);
    for (let i = 0; i < count; i++) spawnEnemy();
    spawnTimer = Math.max(40 - wave * 4, 15);
  }

  // Wave up
  wave = 1 + Math.floor(elapsed / 20);
  waveEl.textContent = `WAVE: ${wave}`;

  // Auto-shoot toward nearest enemy
  bulletTimer -= dt;
  if (bulletTimer <= 0 && enemies.length > 0) {
    let nearest = enemies.reduce((a, b) => dist(player, a) < dist(player, b) ? a : b);
    const angle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
    bullets.push({ x: player.x, y: player.y, vx: Math.cos(angle) * 8, vy: Math.sin(angle) * 8, r: 4 });
    bulletTimer = 12;
  }

  // Move bullets
  for (let b of bullets) { b.x += b.vx * dt; b.y += b.vy * dt; }
  bullets = bullets.filter(b => b.x > -10 && b.x < W+10 && b.y > -10 && b.y < H+10);

  // Move enemies toward player
  for (let e of enemies) {
    const angle = Math.atan2(player.y - e.y, player.x - e.x);
    e.x += Math.cos(angle) * e.speed * dt;
    e.y += Math.sin(angle) * e.speed * dt;
  }

  // Bullet-enemy collision
  for (let b of bullets) {
    for (let e of enemies) {
      if (dist(b, e) < b.r + e.r) {
        e.hp--;
        b.hit = true;
        addParticles(e.x, e.y, '#f0f');
        if (e.hp <= 0) { e.dead = true; score += 10 * wave; }
      }
    }
  }
  bullets = bullets.filter(b => !b.hit);
  enemies = enemies.filter(e => !e.dead);

  // Player-enemy collision
  for (let e of enemies) {
    if (dist(player, e) < player.r + e.r) {
      e.dead = true;
      player.hp--;
      addParticles(player.x, player.y, '#f00');
      if (player.hp <= 0) { gameOver(); return; }
    }
  }
  enemies = enemies.filter(e => !e.dead);

  // Particles
  for (let p of particles) { p.x += p.vx; p.y += p.vy; p.vx *= 0.9; p.vy *= 0.9; p.life -= 0.05; }
  particles = particles.filter(p => p.life > 0);

  // Draw
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#0ff1';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Particles
  for (let p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Enemies
  for (let e of enemies) {
    ctx.strokeStyle = '#f0f';
    ctx.shadowColor = '#f0f';
    ctx.shadowBlur = 10;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.stroke();
    // X inside
    ctx.beginPath();
    ctx.moveTo(e.x - 5, e.y - 5); ctx.lineTo(e.x + 5, e.y + 5);
    ctx.moveTo(e.x + 5, e.y - 5); ctx.lineTo(e.x - 5, e.y + 5);
    ctx.stroke();
  }

  // Bullets
  ctx.fillStyle = '#ff0';
  ctx.shadowColor = '#ff0';
  ctx.shadowBlur = 8;
  for (let b of bullets) {
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
  }

  // Player
  ctx.strokeStyle = '#0ff';
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 16;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.stroke();
  // HP bar
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#333';
  ctx.fillRect(player.x - 15, player.y - 20, 30, 4);
  ctx.fillStyle = '#0f0';
  ctx.fillRect(player.x - 15, player.y - 20, 30 * (player.hp / 5), 4);

  // Joystick overlay
  if (joystick.active) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const bx = (joystick.baseX - rect.left) * scaleX;
    const by = (joystick.baseY - rect.top) * scaleY;
    const nx = bx + joystick.dx * scaleX;
    const ny = by + joystick.dy * scaleY;
    ctx.strokeStyle = '#0ff4';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(bx, by, 50 * scaleX, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = '#0ff6';
    ctx.beginPath(); ctx.arc(nx, ny, 18 * scaleX, 0, Math.PI * 2); ctx.fill();
  }

  // UI
  ctx.shadowBlur = 0;
  scoreEl.textContent = `SCORE: ${score}`;
  timerEl.textContent = `TIME: ${Math.floor(elapsed)}s`;

  requestAnimationFrame(loop);
}

function gameOver() {
  running = false;
  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <h1>GAME OVER</h1>
    <p>SCORE: ${score} &nbsp;|&nbsp; TIME: ${Math.floor(elapsed)}s &nbsp;|&nbsp; WAVE: ${wave}</p>
    <button onclick="startGame()">RETRY</button>
  `;
}

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
</script>
</body>
</html>
